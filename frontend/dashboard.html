<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>ClinicOS | Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="./css/styles.css">
  
  <!-- ✅ CDN de Supabase agregado -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
  <div class="dashboard-container">
    <div class="dashboard-card card">
      <h1 id="clinica">ClinicOS</h1>
      <p id="usuarioInfo" class="user-badge"></p>
      <div class="stats" id="statsContainer" style="display: flex; gap: 10px; justify-content: center; margin-bottom: 20px;">
        <div class="stat-card">
          <h2 id="totalPacientes">0</h2>
          <p data-i18n="pacientes_registrados">Pacientes Registrados</p>
        </div>
        <div class="stat-card">
          <h2 id="totalCitas">0</h2>
          <p data-i18n="citas_agendadas">Citas Agendadas</p>
        </div>
      </div>
      <div class="menu">
        <button class="btn-primary" onclick="irPacientes('ver')">
            <span data-i18n="ver_pacientes">👥 Ver Pacientes</span>
        </button>
        <button class="btn-primary" onclick="irPacientes('nuevo')" style="background-color: #2ecc71;">
            <span data-i18n="agregar_paciente">➕ Agregar Paciente</span>
        </button>
        <button class="btn-primary" onclick="irCitas('ver')" style="background-color: #3498db;">
            <span data-i18n="ver_agenda">📅 Ver Agenda</span>
        </button>
        <button class="btn-primary" onclick="irCitas('nuevo')" style="background-color: #f39c12;">
            <span data-i18n="agendar_cita">⏰ Agendar Cita</span>
        </button>
      </div>
      <button class="logout" id="btnLogout" onclick="logout()" data-i18n="cerrar_sesion">Cerrar sesión</button>
    </div>
  </div>

  <!-- ✅ storage.js va PRIMERO para que supabase esté disponible -->
  <script src="./js/storage.js"></script>
  <script src="./js/translations.js"></script>
  <script src="./js/session.js"></script>
  <script src="./js/dashboard.js"></script>
  <script>
    window.addEventListener('load', () => {
        const savedLang = localStorage.getItem("lang") || "es";
        if(typeof changeLanguage === 'function') {
            changeLanguage(savedLang);
        }
    });
  </script>
</body>
</html>
