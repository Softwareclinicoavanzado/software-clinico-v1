<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>ClinicOS | Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="./css/styles.css">
</head>
<body>

  <div class="dashboard-container">
    <div class="dashboard-card card">
      <h1 id="clinica">ClinicOS</h1>
      <p id="usuarioInfo" class="user-badge"></p>

      <div class="stats" id="statsContainer" style="display: flex; gap: 10px; justify-content: center; margin-bottom: 20px;">
        <div class="stat-card">
          <h2 id="totalPacientes">0</h2>
          <p>Pacientes Registrados</p>
        </div>

        <div class="stat-card">
          <h2 id="totalCitas">0</h2>
          <p>Citas Agendadas</p>
        </div>
      </div>

      <div class="menu">
        <button class="btn-primary" onclick="irPacientes('ver')">👥 Ver Pacientes</button>
        <button class="btn-primary" onclick="irPacientes('nuevo')" style="background-color: #2ecc71;">➕ Agregar Paciente</button>
        
        <button class="btn-primary" onclick="irCitas('ver')" style="background-color: #3498db;">📅 Ver Agenda</button>
        <button class="btn-primary" onclick="irCitas('nuevo')" style="background-color: #f39c12;">⏰ Agendar Cita</button>
      </div>

      <button class="logout" id="btnLogout" onclick="logout()">Cerrar sesión</button>
    </div>
  </div>

  <script src="./js/storage.js"></script>
  <script src="./js/session.js"></script>
  <script src="./js/dashboard.js"></script>
</body>
</html>
