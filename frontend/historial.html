<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>ClinicOS | Historial Clínico</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <div class="container">
    <h1 id="tituloPrincipal">Historial clínico</h1>
    <p class="subtitulo" id="pacienteNombre">Paciente</p>

    <div class="card" id="seccionAgregarNota">
      <h3>Nueva Nota Médica</h3>
      <label><strong>Tipo de nota</strong></label>
      <select id="tipoNota">
        <option value="Consulta">Consulta</option>
        <option value="Diagnóstico">Diagnóstico</option>
        <option value="Seguimiento">Seguimiento</option>
        <option value="Receta">Receta</option>
      </select>

      <label><strong>Nota médica</strong></label>
      <textarea
        id="nota"
        placeholder="Escribir nota médica detallada..."
        style="width:100%;height:120px;border-radius:8px;padding:10px;"
      ></textarea>

      <div style="margin-top:10px;">
        <button type="button" onclick="agregarNota()">Agregar nota</button>
      </div>
    </div>

    <div id="seccionVerHistorial">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
            <h3>Registros Médicos</h3>
            <button type="button" onclick="exportarPDF()" style="background-color: #3498db; padding: 5px 15px;">
                Descargar PDF
            </button>
        </div>
        <ul class="lista" id="listaHistorial"></ul>
    </div>

    <button class="logout" type="button" onclick="volver()" style="margin-top: 20px;">Volver</button>
  </div>

  <script src="js/session.js"></script>
  <script src="js/storage.js"></script>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="js/pdf.js"></script>

  <script src="js/historial.js"></script>
</body>
</html>
