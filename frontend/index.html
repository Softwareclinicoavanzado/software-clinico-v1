<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>ClinicOS | Login</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./css/styles.css">
    
    <!-- ✅ Supabase CDN PRIMERO -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        .lang-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(18, 18, 18, 0.95);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 9999; transition: 0.5s;
        }
        .lang-options { display: flex; gap: 20px; margin-top: 20px; }
        .lang-btn { 
            background: #2c2c2c; border: 2px solid #444; color: white; 
            padding: 15px 25px; border-radius: 12px; cursor: pointer; font-size: 1.1rem;
            transition: 0.3s; display: flex; flex-direction: column; align-items: center; gap: 10px;
        }
        .lang-btn:hover { border-color: #3498db; background: #333; transform: translateY(-5px); }
        .lang-btn span { font-size: 2rem; }
    </style>
</head>
<body>
    <div id="languageSelector" class="lang-overlay">
        <h1 style="color: white; margin-bottom: 10px;">ClinicOS</h1>
        <p style="color: #aaa;">Select your language / Selecciona tu idioma / Choisissez votre langue</p>
        <div class="lang-options">
            <button class="lang-btn" onclick="selectLanguage('es')"><span>🇲🇽</span> Español</button>
            <button class="lang-btn" onclick="selectLanguage('en')"><span>🇺🇸</span> English</button>
            <button class="lang-btn" onclick="selectLanguage('fr')"><span>🇫🇷</span> Français</button>
        </div>
    </div>

    <div class="login-card" style="display: none;" id="loginSection">
        <h1>ClinicOS</h1>
        <p id="mensaje" class="subtitulo" data-i18n="cargando">Cargando clínica...</p>
        <div class="form-group">
            <input id="usuario" type="text" placeholder="Usuario" data-i18n-placeholder="usuario" autocomplete="username">
            <input id="password" type="password" placeholder="Contraseña" data-i18n-placeholder="password" autocomplete="current-password">
        </div>
        <button id="loginBtn" type="button" data-i18n="ingresar">Ingresar</button>
        <p id="error"></p>
        <button onclick="showLangSelector()" style="background:none; border:none; color:#555; cursor:pointer; margin-top:15px; font-size:0.8rem;">🌐 Change Language</button>
    </div>

    <!-- ✅ Orden correcto -->
    <script src="./js/translations.js"></script>
    <script src="./js/storage.js"></script>
    <script src="./js/auth.js"></script>
    <script>
        function selectLanguage(lang) {
            localStorage.setItem("lang", lang);
            document.getElementById("languageSelector").style.opacity = "0";
            setTimeout(() => {
                document.getElementById("languageSelector").style.display = "none";
                document.getElementById("loginSection").style.display = "block";
                if(typeof changeLanguage === 'function') changeLanguage(lang);
            }, 500);
        }
        function showLangSelector() {
            document.getElementById("languageSelector").style.display = "flex";
            document.getElementById("languageSelector").style.opacity = "1";
            document.getElementById("loginSection").style.display = "none";
        }
        window.onload = () => {
            const savedLang = localStorage.getItem("lang");
            if (savedLang) selectLanguage(savedLang);
        };
    </script>
</body>
</html>
