<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>ClinicOS | Login</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./css/styles.css">
</head>
<body>

    <div class="login-card">
        <h1>ClinicOS</h1>
        <p id="mensaje" class="subtitulo">Cargando clínica...</p>

        <div class="form-group">
            <input id="usuario" type="text" placeholder="Usuario" autocomplete="username">
            <input id="password" type="password" placeholder="Contraseña" autocomplete="current-password">
        </div>

        <button id="loginBtn" type="button">Ingresar</button>
        
        <p id="error"></p>
    </div>

    <script src="./js/storage.js"></script>
    <script src="./js/auth.js"></script>
</body>
</html>
