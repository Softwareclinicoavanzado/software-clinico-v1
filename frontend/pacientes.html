<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>ClinicOS | Pacientes</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="./css/styles.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
</head>
<body>

  <div class="container">
    <h1 id="tituloPagina">Gestión de Pacientes</h1>

    <div class="card" id="seccionFormulario">
      <div class="form-grid">
        <input type="text" id="nombre" placeholder="Nombre completo">
        <input type="text" id="dpi" placeholder="DPI (Documento de Identificación)">
        <input type="number" id="edad" placeholder="Edad">
        <input type="text" id="telefono" placeholder="Teléfono">
        
        <div class="input-group">
            <label style="color: white; font-size: 0.8rem; display: block; margin-bottom: 5px;">Fecha de Nacimiento:</label>
            <input type="date" id="fechaNacimiento">
        </div>
        
        <select id="sexo">
          <option value="">Seleccionar Sexo</option>
          <option value="Hombre">Hombre</option>
          <option value="Mujer">Mujer</option>
          <option value="Otro">Otro</option>
        </select>

        <input type="text" id="contactoEmergencia" placeholder="Contacto de emergencia (Nombre/Tel)">
        <input type="text" id="aseguradora" placeholder="Nombre del Seguro">
        <input type="text" id="poliza" placeholder="Número del Seguro">
        <input type="text" id="medicoAsignado" placeholder="Médico Asignado">
        <input type="text" id="sede" placeholder="Sede o Sucursal">

        <button type="button" class="btn-primary" onclick="agregarPaciente()">
          🚀 Añadir al Sistema
        </button>
      </div>
    </div>

    <div id="seccionLista">
        <br>
        <input
          type="text"
          id="busqueda"
          placeholder="🔍 Buscar por nombre, DPI, tel o seguro..."
          oninput="filtrarPacientes()"
        >
        <ul class="lista" id="listaPacientes"></ul>
    </div>

    <button class="secondary" type="button" onclick="volver()" style="margin-top: 20px; width: 100%;">
      Volver al Dashboard
    </button>
  </div>

  <script src="./js/session.js"></script>
  <script src="./js/storage.js"></script>
  <script src="./js/pacientes.js"></script>
</body>
</html>
