<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>ClinicOS | Pacientes</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="./css/styles.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
</head>
<body>

  <div class="container">
    <h1 id="tituloPagina" data-i18n="gestion_pacientes">Gestión de Pacientes</h1>

    <div class="card" id="seccionFormulario">
      <div class="form-grid">
        <input type="text" id="nombre" data-i18n-placeholder="nombre_completo" placeholder="Nombre completo">
        <input type="text" id="dpi" data-i18n-placeholder="dpi_label" placeholder="DPI (Documento de Identificación)">
        <input type="number" id="edad" data-i18n-placeholder="edad_label" placeholder="Edad">
        <input type="text" id="telefono" data-i18n-placeholder="telefono_label" placeholder="Teléfono">
        
        <div class="input-group">
            <label style="color: white; font-size: 0.8rem; display: block; margin-bottom: 5px;" data-i18n="fecha_nacimiento">Fecha de Nacimiento:</label>
            <input type="date" id="fechaNacimiento">
        </div>
        
        <select id="sexo">
          <option value="" data-i18n="seleccionar_sexo">Seleccionar Sexo</option>
          <option value="Hombre" data-i18n="sexo_hombre">Hombre</option>
          <option value="Mujer" data-i18n="sexo_mujer">Mujer</option>
          <option value="Otro" data-i18n="sexo_otro">Otro</option>
        </select>

        <input type="text" id="contactoEmergencia" data-i18n-placeholder="contacto_emergencia_label" placeholder="Contacto de emergencia (Nombre/Tel)">
        <input type="text" id="aseguradora" data-i18n-placeholder="seguro_nombre" placeholder="Nombre del Seguro">
        <input type="text" id="poliza" data-i18n-placeholder="seguro_numero" placeholder="Número del Seguro">
        <input type="text" id="medicoAsignado" data-i18n-placeholder="medico_asignado_label" placeholder="Médico Asignado">
        <input type="text" id="sede" data-i18n-placeholder="sede_label" placeholder="Sede o Sucursal">

        <button type="button" class="btn-primary" onclick="agregarPaciente()">
          <span data-i18n="btn_añadir">🚀 Añadir al Sistema</span>
        </button>
      </div>
    </div>

    <div id="seccionLista">
        <br>
        <input
          type="text"
          id="busqueda"
          data-i18n-placeholder="buscar_placeholder"
          placeholder="🔍 Buscar por nombre, DPI, tel o seguro..."
          oninput="filtrarPacientes()"
        >
        <ul class="lista" id="listaPacientes"></ul>
    </div>

    <button class="secondary" type="button" onclick="volver()" style="margin-top: 20px; width: 100%;">
      <span data-i18n="volver_dashboard">Volver al Dashboard</span>
    </button>
  </div>

  <script src="./js/translations.js"></script>
  <script src="./js/session.js"></script>
  <script src="./js/storage.js"></script>
  <script src="./js/pacientes.js"></script>

  <script>
    // Aplicar el idioma al cargar la página
    window.addEventListener('load', () => {
        const savedLang = localStorage.getItem("lang") || "es";
        if(typeof changeLanguage === 'function') {
            changeLanguage(savedLang);
        }
    });
  </script>
</body>
</html>
